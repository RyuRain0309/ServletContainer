<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Servlet Container</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 40px 48px;
            max-width: 560px;
            width: 100%;
        }
        .badge {
            display: inline-block;
            background: #22c55e;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 99px;
            vertical-align: middle;
            margin-left: 8px;
        }
        h1 { font-size: 1.6rem; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 0.95rem; margin-bottom: 32px; }
        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #999;
            margin-bottom: 12px;
        }
        .endpoint-list { list-style: none; margin-bottom: 28px; }
        .endpoint-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 6px;
            background: #f8fafc;
            transition: background 0.15s;
        }
        .endpoint-list li:hover { background: #e8f5e9; }
        .method {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            background: #dbeafe;
            color: #1d4ed8;
            flex-shrink: 0;
        }
        .endpoint-list a {
            text-decoration: none;
            color: #333;
            font-size: 0.9rem;
            flex: 1;
        }
        .endpoint-list a:hover { color: #16a34a; }
        .stack {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chip {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.8rem;
            color: #475569;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Custom Servlet Container <span class="badge">v1.0</span></h1>
    <p class="subtitle">Spring Boot 위에 직접 구현한 서블릿 컨테이너 학습 프로젝트</p>

    <p class="section-title">엔드포인트</p>
    <ul class="endpoint-list">
        <li>
            <span class="method">GET</span>
            <a href="/hello">/hello — JSON 응답 (정적)</a>
        </li>
        <li>
            <span class="method">GET</span>
            <a href="/hello?name=Spring">/hello?name=Spring — JSON 응답 (파라미터)</a>
        </li>
        <li>
            <span class="method">GET</span>
            <a href="/page">/page — 동적 HTML 응답</a>
        </li>
    </ul>

    <p class="section-title">기술 스택</p>
    <div class="stack">
        <span class="chip">Java 21</span>
        <span class="chip">Spring Boot 4</span>
        <span class="chip">Jakarta Servlet 6.1</span>
        <span class="chip">커스텀 HTTP 파서</span>
        <span class="chip">필터 체인</span>
    </div>
</div>
</body>
</html>
